name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  kibot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: PCB/xESC2.kibot.yaml
          board: PCB/xESC2.kicad_pcb
          schema: PCB/xESC2.kicad_sch
          verbose: 1

      - uses: actions/upload-artifact@v4
        with:
          name: kibot-outputs
          path: release/

      - name: Prepare BOM diff
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p diff diff/sch diff/pcb diff/pcb_no_fills
          find release/default -name "*.csv" ! -name "*cpl*" | head -1 | xargs -I{} cp {} diff/bom_current.csv
          git worktree add main-worktree origin/main

      - name: Generate BOM for main branch
        if: github.event_name == 'pull_request'
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: PCB/xESC2-bom-for-diff.kibot.yaml
          board: main-worktree/PCB/xESC2.kicad_pcb
          schema: main-worktree/PCB/xESC2.kicad_sch
          verbose: 1

      - name: Compute BOM diff
        if: github.event_name == 'pull_request'
        run: |
          find main-bom -name "bom.csv" | head -1 | xargs -I{} cp {} diff/bom_main.csv
          python3 - <<'EOF'
          import csv, re

          def natural_key(s):
              return [int(c) if c.isdigit() else c.lower() for c in re.split(r'(\d+)', s)]

          def expand_and_sort(path):
              with open(path, newline='') as f:
                  rows = list(csv.reader(f))
              header, body = rows[0], rows[1:]
              # kibom prepends a sequential row-number column — strip it if present
              if body and body[0][0].strip().isdigit():
                  header, body = header[1:], [r[1:] for r in body]
              # Find the Designator column
              des_col = next((i for i, h in enumerate(header)
                              if 'designator' in h.lower() or 'reference' in h.lower()), 1)
              # Expand each group row into one row per designator
              expanded = []
              for row in body:
                  for ref in [r.strip() for r in row[des_col].split(',')]:
                      expanded.append(row[:des_col] + [ref] + row[des_col+1:])
              expanded.sort(key=lambda r: natural_key(r[des_col]))
              return header, expanded

          def write(path, header, body):
              with open(path, 'w', newline='') as f:
                  w = csv.writer(f)
                  w.writerow(header)
                  w.writerows(body)

          h, b = expand_and_sort('diff/bom_main.csv')
          write('diff/bom_main_sorted.csv', h, b)
          h, b = expand_and_sort('diff/bom_current.csv')
          write('diff/bom_current_sorted.csv', h, b)
          EOF
          diff -u diff/bom_main_sorted.csv diff/bom_current_sorted.csv > diff/bom_diff.txt || true

      - name: Generate diffs vs main
        if: github.event_name == 'pull_request'
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: PCB/xESC2-diff.kibot.yaml
          board: PCB/xESC2.kicad_pcb
          schema: PCB/xESC2.kicad_sch
          verbose: 1

      - name: Convert PDF diffs to PNG
        if: github.event_name == 'pull_request'
        run: |
          sudo apt-get install -y poppler-utils -qq
          find diff -name "*.pdf" | while IFS= read -r pdf; do
            pdftoppm -r 150 -png "$pdf" "${pdf%.pdf}"
          done

      - name: Upload diffs
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: kibot-diffs
          path: diff/
          if-no-files-found: warn

      - name: Save PR number for comment workflow
        if: github.event_name == 'pull_request'
        run: echo ${{ github.event.pull_request.number }} > diff/pr-number.txt

      - name: Upload PR number
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-number
          path: diff/pr-number.txt

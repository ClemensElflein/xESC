name: CI

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  kibot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: PCB/xESC2.kibot.yaml
          board: PCB/xESC2.kicad_pcb
          schema: PCB/xESC2.kicad_sch
          verbose: 1

      - uses: actions/upload-artifact@v4
        with:
          name: kibot-outputs
          path: release/

      - name: Generate diffs vs main
        if: github.event_name == 'pull_request'
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: PCB/xESC2-diff.kibot.yaml
          board: PCB/xESC2.kicad_pcb
          schema: PCB/xESC2.kicad_sch
          verbose: 1

      - name: Upload diffs
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: kibot-diffs
          path: diff/
          if-no-files-found: warn

      - name: Post diff comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- kibot-diff-comment -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '## KiBot Diff vs `main`',
              '',
              `Schematic and PCB diffs (PDF) are available in the **[workflow artifacts](${runUrl})** — download \`kibot-diffs\` from the Artifacts section.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

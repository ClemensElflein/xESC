name: CI

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  kibot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: PCB/xESC2.kibot.yaml
          board: PCB/xESC2.kicad_pcb
          schema: PCB/xESC2.kicad_sch
          verbose: 1

      - uses: actions/upload-artifact@v4
        with:
          name: kibot-outputs
          path: release/

      - name: Prepare BOM diff
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p diff
          find release -name "*.csv" ! -name "*cpl*" | head -1 | xargs -I{} cp {} diff/bom_current.csv
          git worktree add main-worktree origin/main

      - name: Generate BOM for main branch
        if: github.event_name == 'pull_request'
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: PCB/xESC2-bom-for-diff.kibot.yaml
          board: main-worktree/PCB/xESC2.kicad_pcb
          schema: main-worktree/PCB/xESC2.kicad_sch
          verbose: 1

      - name: Compute BOM diff
        if: github.event_name == 'pull_request'
        run: |
          find main-bom -name "bom.csv" | head -1 | xargs -I{} cp {} diff/bom_main.csv
          { head -1 diff/bom_current.csv; tail -n +2 diff/bom_current.csv | sort; } > diff/bom_current_sorted.csv
          { head -1 diff/bom_main.csv;    tail -n +2 diff/bom_main.csv    | sort; } > diff/bom_main_sorted.csv
          diff diff/bom_main_sorted.csv diff/bom_current_sorted.csv > diff/bom_diff.txt || true

      - name: Generate diffs vs main
        if: github.event_name == 'pull_request'
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: PCB/xESC2-diff.kibot.yaml
          board: PCB/xESC2.kicad_pcb
          schema: PCB/xESC2.kicad_sch
          verbose: 1

      - name: Upload diffs
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: kibot-diffs
          path: diff/
          if-no-files-found: warn

      - name: Post diff comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- kibot-diff-comment -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let bomSection = '\n\n**BOM diff:** no changes vs `main`.';
            try {
              const bomDiff = fs.readFileSync('diff/bom_diff.txt', 'utf8').trim();
              if (bomDiff) {
                bomSection = `\n\n<details>\n<summary>BOM diff vs <code>main</code></summary>\n\n\`\`\`diff\n${bomDiff}\n\`\`\`\n</details>`;
              }
            } catch (e) {}

            const body = [
              marker,
              '## KiBot Diff vs `main`',
              '',
              `Schematic and PCB diffs (PDF) are available in the **[workflow artifacts](${runUrl})** — download \`kibot-diffs\` from the Artifacts section.`,
              bomSection,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  kibot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: PCB/xESC2.kibot.yaml
          board: PCB/xESC2.kicad_pcb
          schema: PCB/xESC2.kicad_sch
          verbose: 1

      - uses: actions/upload-artifact@v4
        with:
          name: kibot-outputs
          path: release/

      - name: Prepare BOM diff
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p diff
          find release -name "*.csv" ! -name "*cpl*" | head -1 | xargs -I{} cp {} diff/bom_current.csv
          git worktree add main-worktree origin/main

      - name: Generate BOM for main branch
        if: github.event_name == 'pull_request'
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: PCB/xESC2-bom-for-diff.kibot.yaml
          board: main-worktree/PCB/xESC2.kicad_pcb
          schema: main-worktree/PCB/xESC2.kicad_sch
          verbose: 1

      - name: Compute BOM diff
        if: github.event_name == 'pull_request'
        run: |
          find main-bom -name "bom.csv" | head -1 | xargs -I{} cp {} diff/bom_main.csv
          { head -1 diff/bom_current.csv; tail -n +2 diff/bom_current.csv | sort; } > diff/bom_current_sorted.csv
          { head -1 diff/bom_main.csv;    tail -n +2 diff/bom_main.csv    | sort; } > diff/bom_main_sorted.csv
          diff diff/bom_main_sorted.csv diff/bom_current_sorted.csv > diff/bom_diff.txt || true

      - name: Generate diffs vs main
        if: github.event_name == 'pull_request'
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: PCB/xESC2-diff.kibot.yaml
          board: PCB/xESC2.kicad_pcb
          schema: PCB/xESC2.kicad_sch
          verbose: 1

      - name: Upload diffs
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: kibot-diffs
          path: diff/
          if-no-files-found: warn

      - name: Save PR number for comment workflow
        if: github.event_name == 'pull_request'
        run: echo ${{ github.event.pull_request.number }} > diff/pr-number.txt

      - name: Upload PR number
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-number
          path: diff/pr-number.txt

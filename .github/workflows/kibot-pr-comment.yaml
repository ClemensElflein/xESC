name: Post PR Comment

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  pull-requests: write
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Download PR number
        uses: actions/download-artifact@v4
        with:
          name: pr-number
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: pr-meta

      - name: Download diffs
        uses: actions/download-artifact@v4
        with:
          name: kibot-diffs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: diffs

      - name: Post diff comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt(fs.readFileSync('pr-meta/pr-number.txt', 'utf8').trim(), 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.event.workflow_run.id }}`;

            let bomSection = '\n\n**BOM diff:** no changes vs `main`.';
            try {
              const bomDiff = fs.readFileSync('diffs/bom_diff.txt', 'utf8').trim();
              if (bomDiff) {
                bomSection = `\n\n<details>\n<summary>BOM diff vs <code>main</code></summary>\n\n\`\`\`diff\n${bomDiff}\n\`\`\`\n</details>`;
              }
            } catch (e) {}

            const marker = '<!-- kibot-diff-comment -->';
            const body = [
              marker,
              '## KiBot Diff vs `main`',
              '',
              `Schematic and PCB diffs (PDF) are available in the **[workflow artifacts](${runUrl})** — download \`kibot-diffs\` from the Artifacts section.`,
              bomSection,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

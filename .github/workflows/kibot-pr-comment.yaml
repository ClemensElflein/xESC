name: Post PR Comment

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  pull-requests: write
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Download PR number
        uses: actions/download-artifact@v4
        with:
          name: pr-number
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: pr-meta

      - name: Download diffs
        uses: actions/download-artifact@v4
        with:
          name: kibot-diffs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: diffs

      - name: Post diff comment on PR
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const prNumber = parseInt(fs.readFileSync('pr-meta/pr-number.txt', 'utf8').trim(), 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.event.workflow_run.id }}`;
            const uploadsUrl = `https://uploads.github.com/repos/${context.repo.owner}/${context.repo.repo}/issues/${prNumber}/attachments`;

            // Upload a PNG and return its hosted URL, or null on failure.
            async function uploadImage(filePath) {
              try {
                const data = fs.readFileSync(filePath);
                const res = await fetch(uploadsUrl, {
                  method: 'POST',
                  headers: {
                    Authorization: `token ${process.env.GH_TOKEN}`,
                    'Content-Type': 'image/png',
                  },
                  body: data,
                });
                if (!res.ok) return null;
                return (await res.json()).url;
              } catch (e) {
                return null;
              }
            }

            // Upload all PNGs and sort into three buckets based on output name in filename.
            const pngFiles = fs.existsSync('diffs')
              ? fs.readdirSync('diffs').filter(f => f.endsWith('.png')).sort()
              : [];

            const schUrls = [], pcbUrls = [], pcbNoZonesUrls = [];
            for (const file of pngFiles) {
              const url = await uploadImage(path.join('diffs', file));
              if (!url) continue;
              const lf = file.toLowerCase();
              if      (lf.includes('_sch'))      schUrls.push(url);
              else if (lf.includes('no_zones'))  pcbNoZonesUrls.push(url);
              else                               pcbUrls.push(url);
            }

            const imgMd = urls => urls.map(u => `![diff](${u})`).join('\n');

            const sections = [];
            if (schUrls.length)        sections.push(`### Schematic\n${imgMd(schUrls)}`);
            if (pcbUrls.length)        sections.push(`### PCB\n${imgMd(pcbUrls)}`);
            if (pcbNoZonesUrls.length) sections.push(`### PCB (without copper fills)\n${imgMd(pcbNoZonesUrls)}`);

            const visualSection = sections.length
              ? sections.join('\n\n')
              : `_No visual diffs detected — [view raw artifacts](${runUrl})_`;

            // BOM diff
            let bomSection = '_No BOM changes._';
            try {
              const bomDiff = fs.readFileSync('diffs/bom_diff.txt', 'utf8').trim();
              if (bomDiff) {
                bomSection = `<details>\n<summary>Show BOM diff</summary>\n\n\`\`\`diff\n${bomDiff}\n\`\`\`\n</details>`;
              }
            } catch (e) {}

            const marker = '<!-- kibot-diff-comment -->';
            const body = `${marker}
## KiBot Diff vs \`main\`

${visualSection}

---

### BOM
${bomSection}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

kibot:
  version: 1

outputs:
  - name: 'diff_sch'
    comment: 'Schematic diff vs main'
    type: 'diff'
    dir: 'diff'
    options:
      old: 'origin/main'
      old_type: git
      new_type: git
      pcb: false
      only_different: true

  - name: 'diff_pcb'
    comment: 'PCB diff vs main'
    type: 'diff'
    dir: 'diff'
    options:
      old: 'origin/main'
      old_type: git
      new_type: git
      pcb: true
      only_different: true
